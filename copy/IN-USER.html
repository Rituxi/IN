<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指标笔记 Inno</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 优雅的背景环境光动画 */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .ambient-glow { animation: pulse-slow 8s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#f5f5f7] font-sans text-zinc-900 overflow-x-hidden selection:bg-emerald-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // === 图标渲染引擎 ===
        const IconWrapper = ({ iconName, size = 24, className = '', strokeWidth = 2 }) => {
            const iconObj = lucide.icons[iconName];
            if (!iconObj) return null;
            const svgNode = lucide.createElement(iconObj);
            svgNode.setAttribute('width', size);
            svgNode.setAttribute('height', size);
            svgNode.setAttribute('stroke-width', strokeWidth);
            svgNode.setAttribute('class', `lucide lucide-${iconName}`);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svgNode.outerHTML }} />;
        };

        const UploadCloud = (p) => <IconWrapper iconName="UploadCloud" {...p} />;
        const History = (p) => <IconWrapper iconName="History" {...p} />;
        const FileJson = (p) => <IconWrapper iconName="FileJson" {...p} />;
        const ScanText = (p) => <IconWrapper iconName="ScanText" {...p} />;
        const FileImage = (p) => <IconWrapper iconName="FileImage" {...p} />;

        function App() {
            const [isDragging, setIsDragging] = useState(false);

            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); alert("触发了文件上传！"); };

            return (
                <div className="relative min-h-screen flex flex-col items-center justify-center pb-16 px-4 sm:px-6">
                    
                    {/* 环境光影 */}
                    <div className="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-emerald-400/20 rounded-full blur-[140px] pointer-events-none ambient-glow" style={{ animationDelay: '0s' }}></div>
                    <div className="absolute bottom-[10%] right-[-5%] w-[600px] h-[600px] bg-teal-400/10 rounded-full blur-[150px] pointer-events-none ambient-glow" style={{ animationDelay: '3s' }}></div>

                    {/* 英雄区 (Hero Section) - 整体垂直居中，极致聚焦 */}
                    <div className="w-full max-w-4xl text-center mb-12 relative z-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
                        <h1 className="text-[56px] sm:text-[72px] font-bold text-zinc-900 tracking-tight leading-[1.05] mb-6">
                            指标笔记 <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500">Inno</span>
                        </h1>
                        
                        <p className="text-[18px] text-zinc-500 max-w-2xl mx-auto font-medium leading-relaxed mb-10">
                            上传医疗检查图片或 Excel，快速得到精准的结构化结果，<br className="hidden sm:block" />
                            方便后续存档、导出和深度医疗分析。
                        </p>

                        {/* 核心改动：极简、通透的“幽灵胶囊” (Ghost Pills) */}
                        <div className="flex flex-wrap items-center justify-center gap-3 sm:gap-4">
                            {[
                                { icon: FileImage, text: "支持图片与 Excel" },
                                { icon: ScanText, text: "自动提取检查项目" },
                                { icon: FileJson, text: "一键导出标准 JSON" }
                            ].map((tag, idx) => (
                                <div key={idx} className="flex items-center gap-2 px-5 py-2.5 bg-emerald-500/5 backdrop-blur-md rounded-full border border-emerald-500/10 text-zinc-700 text-[14px] font-medium hover:bg-emerald-500/10 hover:-translate-y-0.5 transition-all duration-300">
                                    <tag.icon size={18} className="text-emerald-500" strokeWidth={2} />
                                    {tag.text}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 上传操作区 (纯净悬浮画布) */}
                    <div className="w-full max-w-3xl relative z-10 animate-in fade-in slide-in-from-bottom-12 duration-1000 delay-150 fill-mode-both">
                        
                        <div 
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                            onDrop={handleDrop}
                            className={`relative w-full h-[340px] rounded-[36px] flex flex-col items-center justify-center transition-all duration-500 ease-out overflow-hidden cursor-pointer group
                                ${isDragging 
                                    ? 'bg-emerald-50/90 ring-2 ring-emerald-400 scale-[0.98] shadow-inner' 
                                    : 'bg-white/70 backdrop-blur-3xl hover:bg-white shadow-[0_12px_40px_-12px_rgba(0,0,0,0.06)] ring-1 ring-zinc-200/60 border border-transparent hover:border-emerald-200/50 hover:shadow-[0_20px_60px_-15px_rgba(16,185,129,0.12)]'
                                }
                            `}
                        >
                            {/* 悬浮的历史记录按钮：内嵌在上传画布的右上角 */}
                            <button className="absolute top-6 right-6 flex items-center gap-2 px-4 py-2 bg-zinc-100/60 hover:bg-zinc-200/80 text-zinc-600 rounded-full text-[13px] font-semibold transition-all z-20 shadow-sm backdrop-blur-md">
                                <History size={16} /> 历史记录 <span className="bg-white px-1.5 py-0.5 rounded-full text-[11px] shadow-sm text-zinc-800">5</span>
                            </button>

                            {/* 内部呼吸光效 */}
                            <div className={`absolute inset-0 bg-gradient-to-b from-emerald-100/20 to-transparent opacity-0 transition-opacity duration-500 pointer-events-none ${isDragging ? 'opacity-100' : 'group-hover:opacity-100'}`}></div>

                            {/* 高级上传图标 */}
                            <div className={`w-24 h-24 rounded-full flex items-center justify-center mb-6 transition-all duration-500 z-10 ${
                                isDragging 
                                    ? 'bg-emerald-500 text-white scale-110 shadow-[0_0_40px_rgba(16,185,129,0.4)]' 
                                    : 'bg-zinc-50/80 text-zinc-400 ring-1 ring-zinc-200/50 group-hover:bg-emerald-50 group-hover:text-emerald-500 group-hover:ring-emerald-200 group-hover:scale-110'
                            }`}>
                                <UploadCloud size={36} strokeWidth={isDragging ? 2.5 : 2} />
                            </div>

                            <h3 className={`text-[22px] font-semibold tracking-tight mb-2 transition-colors duration-300 z-10 ${isDragging ? 'text-emerald-700' : 'text-zinc-800 group-hover:text-emerald-600'}`}>
                                {isDragging ? '释放鼠标立即识别' : '点击选择文件，或将文件拖拽至此'}
                            </h3>
                            
                            <p className="text-[14px] text-zinc-400 font-medium z-10">
                                支持 JPG、PNG、XLS、XLSX 格式
                            </p>

                            {/* 隐藏的 input */}
                            <input type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" accept=".jpg,.jpeg,.png,.xls,.xlsx" />
                        </div>
                    </div>

                    <div className="absolute bottom-6 text-center text-zinc-400 text-[12px] font-medium w-full pointer-events-none">
                        &copy; 2026 指标笔记 Inno. All rights reserved. 
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
