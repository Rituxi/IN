<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INNO ADMIN - 后台管理系统</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 用于在浏览器中实时编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* 增加平滑展开动画 */
        .expand-transition { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out; }
        
        /* 隐藏原生日期输入框的默认图标 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
    </style>
</head>
<body class="bg-[#f2f2f5]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // === 图标渲染引擎 ===
        const IconWrapper = ({ iconName, size = 24, className = '', strokeWidth = 2 }) => {
            const iconObj = lucide.icons[iconName];
            if (!iconObj) return null;
            const svgNode = lucide.createElement(iconObj);
            svgNode.setAttribute('width', size);
            svgNode.setAttribute('height', size);
            svgNode.setAttribute('stroke-width', strokeWidth);
            svgNode.setAttribute('class', `lucide lucide-${iconName}`);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svgNode.outerHTML }} />;
        };

        const Search = (p) => <IconWrapper iconName="Search" {...p} />;
        const ChevronDown = (p) => <IconWrapper iconName="ChevronDown" {...p} />;
        const ChevronUp = (p) => <IconWrapper iconName="ChevronUp" {...p} />;
        const ChevronLeft = (p) => <IconWrapper iconName="ChevronLeft" {...p} />;
        const ChevronRight = (p) => <IconWrapper iconName="ChevronRight" {...p} />;
        const Edit = (p) => <IconWrapper iconName="Edit" {...p} />;
        const X = (p) => <IconWrapper iconName="X" {...p} />;
        const Users = (p) => <IconWrapper iconName="Users" {...p} />;
        const Shield = (p) => <IconWrapper iconName="Shield" {...p} />;
        const Star = (p) => <IconWrapper iconName="Star" {...p} />;
        const Crown = (p) => <IconWrapper iconName="Crown" {...p} />;
        const Sparkles = (p) => <IconWrapper iconName="Sparkles" {...p} />;
        const FileText = (p) => <IconWrapper iconName="FileText" {...p} />;
        const Key = (p) => <IconWrapper iconName="Key" {...p} />;
        const Settings = (p) => <IconWrapper iconName="Settings" {...p} />;
        const LogOut = (p) => <IconWrapper iconName="LogOut" {...p} />;
        const BarChart2 = (p) => <IconWrapper iconName="BarChart2" {...p} />;
        const Activity = (p) => <IconWrapper iconName="Activity" {...p} />;
        const Calendar = (p) => <IconWrapper iconName="Calendar" {...p} />;
        const Trash2 = (p) => <IconWrapper iconName="Trash2" {...p} />;
        const RefreshCw = (p) => <IconWrapper iconName="RefreshCw" {...p} />;
        const Plus = (p) => <IconWrapper iconName="Plus" {...p} />;
        const Tag = (p) => <IconWrapper iconName="Tag" {...p} />;
        const PackageOpen = (p) => <IconWrapper iconName="PackageOpen" {...p} />;
        const Save = (p) => <IconWrapper iconName="Save" {...p} />;
        const Terminal = (p) => <IconWrapper iconName="Terminal" {...p} />;
        const CheckCircle2 = (p) => <IconWrapper iconName="CheckCircle2" {...p} />;
        const PieChart = (p) => <IconWrapper iconName="PieChart" {...p} />;
        const TrendingUp = (p) => <IconWrapper iconName="TrendingUp" {...p} />;
        const CalendarDays = (p) => <IconWrapper iconName="CalendarDays" {...p} />;
        const Download = (p) => <IconWrapper iconName="Download" {...p} />;

        // === 模拟数据 ===
        const initialUsers = [{ id: 'oui5h1-QdbmUGDLgL2...', group: '个人', level: 'Care', ocrQuota: '3/25', summaryQuota: '7/20', extraQuota: { ocr: 0, summary: 0 }, totalUsed: { current: 3, total: 7 }, joinDate: '2026-03-17', remark: '' }, { id: 'oui5h1yAqcG9vpLObbl...', group: '个人', level: 'Care+', ocrQuota: '2/50', summaryQuota: '4/50', extraQuota: { ocr: 0, summary: 0 }, totalUsed: { current: 2, total: 4 }, joinDate: '2026-03-17', remark: '模拟器' }];
        const initialLogs = [{ id: 1, time: '2026-03-18 09:17:23', userId: 'oui5h1-QdbmUGDL...', ip: '49.82.123.92', location: '南京', feature: '智能小结', monthCount: 8, totalCount: 8 }];
        const mockCodes = [{ id: 'CARE-PLUS-9A8B7C6D', type: 'Care+ 高级版', genTime: '2026-03-18 10:00:00', expTime: '2027-03-18 10:00:00', status: 'active' }];

        // === 清理后的数据生成器 ===
        const generateYearData = () => {
            const months = ['2026-03', '2026-02', '2026-01'];
            const data = [];
            months.forEach(month => {
                const daysInMonth = month === '2026-02' ? 28 : 31;
                const daysData = [];
                let mOcr = 0, mSum = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const baseOcr = Math.floor(Math.random() * 40) + 10;
                    const baseSum = Math.floor(Math.random() * 30) + 20;
                    mOcr += baseOcr;
                    mSum += baseSum;

                    daysData.push({
                        date: `${month}-${d.toString().padStart(2, '0')}`,
                        displayLabel: `${d.toString().padStart(2, '0')}日`,
                        ocr: baseOcr,
                        summary: baseSum,
                        total: baseOcr + baseSum,
                        remark: '' // 核心优化：默认清空所有模拟备注
                    });
                }

                data.push({
                    month,
                    totalOcr: mOcr,
                    totalSummary: mSum,
                    total: mOcr + mSum,
                    remark: '', // 核心优化：默认清空月份备注
                    days: daysData.reverse()
                });
            });
            return data;
        };

        // ==========================================
        // 原生 SVG 渐变曲线图组件
        // ==========================================
        const SmoothLineChart = ({ data }) => {
            const [hoverIdx, setHoverIdx] = useState(null);
            
            if (!data || data.length === 0) return (
                <div className="w-full h-[260px] flex items-center justify-center text-zinc-400 text-[14px]">暂无该区间数据</div>
            );

            const maxVal = Math.max(...data.map(d => Math.max(d.ocr, d.summary))) * 1.2 || 1;
            const chartWidth = 1000;
            const chartHeight = 240;
            
            const getPoints = (key) => data.map((d, i) => {
                const x = (i / (data.length - 1 || 1)) * chartWidth;
                const y = chartHeight - (d[key] / maxVal) * chartHeight;
                return `${x},${y}`;
            }).join(' L ');

            const getArea = (key) => `M 0,${chartHeight} L ${getPoints(key)} L ${chartWidth},${chartHeight} Z`;

            const ocrArea = getArea('ocr'); const ocrPath = `M ${getPoints('ocr')}`;
            const sumArea = getArea('summary'); const sumPath = `M ${getPoints('summary')}`;

            return (
                <div className="relative w-full h-[260px]" onMouseLeave={() => setHoverIdx(null)}>
                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-[20px]">
                        <div className="border-t border-dashed border-zinc-200/80 w-full h-0"></div>
                        <div className="border-t border-dashed border-zinc-200/80 w-full h-0"></div>
                        <div className="border-t border-dashed border-zinc-200/80 w-full h-0"></div>
                    </div>

                    <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="absolute inset-0 w-full h-[240px] overflow-visible preserve-3d" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="grad-ocr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(16, 185, 129, 0.3)" /><stop offset="100%" stopColor="rgba(16, 185, 129, 0)" /></linearGradient>
                            <linearGradient id="grad-sum" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(59, 130, 246, 0.3)" /><stop offset="100%" stopColor="rgba(59, 130, 246, 0)" /></linearGradient>
                        </defs>
                        <path d={sumArea} fill="url(#grad-sum)" className="transition-all duration-500 ease-out" />
                        <path d={ocrArea} fill="url(#grad-ocr)" className="transition-all duration-500 ease-out" />
                        <path d={sumPath} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-500 ease-out drop-shadow-sm" />
                        <path d={ocrPath} fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-500 ease-out drop-shadow-sm" />
                        
                        {data.map((d, i) => {
                            const cx = (i / (data.length - 1 || 1)) * chartWidth;
                            const cyOcr = chartHeight - (d.ocr / maxVal) * chartHeight;
                            const cySum = chartHeight - (d.summary / maxVal) * chartHeight;
                            return (
                                <g key={i}>
                                    <circle cx={cx} cy={cyOcr} r="4" fill="#fff" stroke="#10b981" strokeWidth="2" className={`transition-all duration-200 ${hoverIdx === i ? 'opacity-100 scale-125' : 'opacity-0'}`} />
                                    <circle cx={cx} cy={cySum} r="4" fill="#fff" stroke="#3b82f6" strokeWidth="2" className={`transition-all duration-200 ${hoverIdx === i ? 'opacity-100 scale-125' : 'opacity-0'}`} />
                                </g>
                            )
                        })}
                    </svg>

                    <div className="absolute inset-0 flex h-[240px] z-20">
                        {data.map((d, i) => (
                            <div key={i} className="flex-1 h-full relative group cursor-crosshair" onMouseEnter={() => setHoverIdx(i)}>
                                <span className="absolute top-[100%] left-1/2 -translate-x-1/2 mt-2 text-[11px] font-mono text-zinc-600 opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap">
                                    {d.displayLabel || d.date}
                                </span>

                                {hoverIdx === i && (
                                    <div className="absolute bottom-1/2 left-1/2 -translate-x-1/2 mb-4 pointer-events-none z-30 flex flex-col items-center animate-in fade-in zoom-in-95 duration-200">
                                        <div className="bg-zinc-900/95 backdrop-blur-md text-white px-4 py-3 rounded-[16px] shadow-[0_10px_30px_rgba(0,0,0,0.2)] text-[12px] font-medium flex flex-col gap-2 min-w-[130px] border border-white/10">
                                            <div className="text-zinc-400 font-mono text-[11px] text-center mb-1">{d.date} 数据</div>
                                            <div className="flex justify-between items-center gap-4">
                                                <div className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div><span>OCR</span></div>
                                                <span className="font-bold text-[14px] text-emerald-400">{d.ocr}</span>
                                            </div>
                                            <div className="flex justify-between items-center gap-4">
                                                <div className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div><span>小结</span></div>
                                                <span className="font-bold text-[14px] text-blue-400">{d.summary}</span>
                                            </div>
                                            <div className="h-[1px] bg-zinc-700/50 my-0.5"></div>
                                            <div className="flex justify-between gap-4 text-[13px]"><span className="text-zinc-300">总计</span><span className="font-bold text-white">{d.total}</span></div>
                                        </div>
                                    </div>
                                )}
                                {hoverIdx === i && <div className="absolute top-0 bottom-0 left-1/2 w-[1px] bg-zinc-900/10 pointer-events-none"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // === 主应用组件 ===
        function App() {
            const [activeTab, setActiveTab] = useState('analytics'); 
            const [archiveData, setArchiveData] = useState(() => generateYearData()); 
            
            const [timeRange, setTimeRange] = useState('month');
            const [currentPeriodIdx, setCurrentPeriodIdx] = useState(0); 
            const [customStart, setCustomStart] = useState('2026-02-15');
            const [customEnd, setCustomEnd] = useState('2026-03-15');
            
            // 核心优化 1：默认让所有的明细折叠，不展开任何月份！
            const [expandedMonths, setExpandedMonths] = useState([]);

            const filteredArchiveData = useMemo(() => {
                if (timeRange !== 'custom') return archiveData;
                
                const startD = new Date(customStart);
                const endD = new Date(customEnd);
                if (isNaN(startD) || isNaN(endD)) return archiveData;

                return archiveData.map(m => {
                    const filteredDays = m.days.filter(d => {
                        const currentD = new Date(d.date);
                        return currentD >= startD && currentD <= endD;
                    });
                    const totalOcr = filteredDays.reduce((sum, d) => sum + d.ocr, 0);
                    const totalSummary = filteredDays.reduce((sum, d) => sum + d.summary, 0);
                    return { ...m, days: filteredDays, totalOcr, totalSummary, total: totalOcr + totalSummary };
                }).filter(m => m.days.length > 0); 
            }, [timeRange, customStart, customEnd, archiveData]);

            const displayChartData = useMemo(() => {
                if (timeRange === 'month') {
                    if(!archiveData[currentPeriodIdx]) return [];
                    return [...archiveData[currentPeriodIdx].days].reverse();
                } else if (timeRange === 'year') {
                    return [...archiveData].reverse().map(m => ({
                        date: m.month, displayLabel: m.month.split('-')[1] + '月', ocr: m.totalOcr, summary: m.totalSummary, total: m.total
                    }));
                } else {
                    const flatDays = filteredArchiveData.flatMap(m => m.days);
                    return flatDays.reverse();
                }
            }, [timeRange, currentPeriodIdx, filteredArchiveData, archiveData]);

            const currentTotalOcr = displayChartData.reduce((acc, curr) => acc + curr.ocr, 0);
            const currentTotalSummary = displayChartData.reduce((acc, curr) => acc + curr.summary, 0);

            const handleMonthRemarkChange = (monthStr, newText) => {
                setArchiveData(prev => prev.map(m => m.month === monthStr ? { ...m, remark: newText } : m));
            };

            const handleDayRemarkChange = (monthStr, dateStr, newText) => {
                setArchiveData(prev => prev.map(m => {
                    if (m.month === monthStr) {
                        return { ...m, days: m.days.map(d => d.date === dateStr ? { ...d, remark: newText } : d) };
                    }
                    return m;
                }));
            };

            const toggleMonth = (monthStr) => {
                setExpandedMonths(prev => prev.includes(monthStr) ? prev.filter(m => m !== monthStr) : [...prev, monthStr]);
            };

            return (
                <div className="min-h-screen bg-[#f2f2f5] p-4 sm:p-6 font-sans text-zinc-900 selection:bg-zinc-200 flex justify-center">
                    <div className="w-full max-w-[1600px] flex gap-6">
                        
                        <aside className="hidden md:flex flex-col w-[260px] h-[calc(100vh-48px)] sticky top-6 bg-white/50 backdrop-blur-2xl rounded-[32px] ring-1 ring-white/80 shadow-[0_8px_32px_-8px_rgba(0,0,0,0.04)] p-5 overflow-y-auto scrollbar-hide z-50">
                            <div className="px-3 pt-2 pb-6">
                                <div className="flex items-center gap-2 mb-3">
                                    <div className="w-8 h-8 rounded-[10px] bg-zinc-900 flex items-center justify-center text-white shadow-md"><Sparkles size={16} /></div>
                                    <h1 className="text-[18px] font-bold tracking-tight text-zinc-900">INNO ADMIN</h1>
                                </div>
                                <p className="text-[12px] leading-relaxed text-zinc-500 font-medium">后台管理台<br/><span className="text-zinc-400 font-normal">统一管理日志、用户、配置。</span></p>
                            </div>

                            <nav className="flex-1 flex flex-col gap-1.5">
                                {[
                                    { id: 'analytics', icon: PieChart, label: '数据分析' },
                                    { id: 'logs', icon: FileText, label: '使用记录' },
                                    { id: 'users', icon: Users, label: '用户管理' },
                                    { id: 'settings', icon: Settings, label: '等级配置' }
                                ].map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`flex items-center gap-3 px-4 py-3 rounded-[16px] text-[14px] font-medium transition-all duration-200 ${
                                            activeTab === item.id ? 'bg-white/90 text-zinc-900 shadow-sm ring-1 ring-zinc-200/50' : 'text-zinc-500 hover:bg-white/40 hover:text-zinc-800'
                                        }`}
                                    >
                                        <item.icon size={18} className={activeTab === item.id ? 'text-zinc-800' : 'text-zinc-400'} />
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        <main className="flex-1 min-w-0 flex flex-col gap-6 pb-12">
                            {activeTab === 'analytics' && (
                                <div className="flex flex-col gap-6 animate-in fade-in duration-300">
                                    
                                    <div className="flex flex-wrap items-end justify-between gap-4 px-2">
                                        <div>
                                            <div className="text-[11px] font-bold text-zinc-400 tracking-widest uppercase mb-1">Analytics Dashboard</div>
                                            <h2 className="text-[28px] font-semibold text-zinc-900 tracking-tight flex items-center gap-3 mb-2">数据分析</h2>
                                            <p className="text-[13px] text-zinc-500 font-medium">查看并存档各功能的使用趋势，支持按月、年及自定义周期聚合。</p>
                                        </div>
                                        
                                        <div className="flex items-center gap-3">
                                            {timeRange === 'custom' && (
                                                <div className="flex items-center gap-2 bg-white/40 backdrop-blur-xl ring-1 ring-zinc-200/50 rounded-full px-2 py-1 shadow-sm animate-in fade-in slide-in-from-right-4 duration-300 h-[36px]">
                                                    <div className="relative">
                                                        <input type="date" value={customStart} onChange={e => setCustomStart(e.target.value)} className="appearance-none bg-transparent px-3 py-1 text-[13px] font-semibold text-zinc-700 outline-none w-[110px] cursor-pointer hover:text-emerald-600 transition-colors" />
                                                    </div>
                                                    <span className="text-zinc-300 font-light">|</span>
                                                    <div className="relative">
                                                        <input type="date" value={customEnd} onChange={e => setCustomEnd(e.target.value)} className="appearance-none bg-transparent px-3 py-1 text-[13px] font-semibold text-zinc-700 outline-none w-[110px] cursor-pointer hover:text-emerald-600 transition-colors" />
                                                    </div>
                                                </div>
                                            )}

                                            {timeRange === 'month' && archiveData.length > 0 && (
                                                <div className="flex items-center bg-white/40 backdrop-blur-xl ring-1 ring-zinc-200/50 rounded-full shadow-sm overflow-hidden h-[36px]">
                                                    <button disabled={currentPeriodIdx >= archiveData.length - 1} onClick={() => setCurrentPeriodIdx(p => p + 1)} className="px-3 h-full flex items-center hover:bg-white/60 disabled:opacity-30 disabled:cursor-not-allowed transition-colors text-zinc-600"><ChevronLeft size={16}/></button>
                                                    <span className="text-[13px] font-semibold text-zinc-800 w-24 text-center">{archiveData[currentPeriodIdx].month}</span>
                                                    <button disabled={currentPeriodIdx === 0} onClick={() => setCurrentPeriodIdx(p => p - 1)} className="px-3 h-full flex items-center hover:bg-white/60 disabled:opacity-30 disabled:cursor-not-allowed transition-colors text-zinc-600"><ChevronRight size={16}/></button>
                                                </div>
                                            )}

                                            <div className="flex items-center bg-white/40 backdrop-blur-xl ring-1 ring-zinc-200/50 p-1 rounded-full shadow-sm h-[36px]">
                                                <button onClick={() => {setTimeRange('month'); setCurrentPeriodIdx(0);}} className={`px-4 py-1 text-[13px] font-semibold rounded-full transition-all duration-200 h-full ${timeRange === 'month' ? 'bg-white text-zinc-900 shadow-[0_2px_8px_-2px_rgba(0,0,0,0.1)]' : 'text-zinc-500 hover:text-zinc-700'}`}>单月</button>
                                                <button onClick={() => setTimeRange('year')} className={`px-4 py-1 text-[13px] font-semibold rounded-full transition-all duration-200 h-full ${timeRange === 'year' ? 'bg-white text-zinc-900 shadow-[0_2px_8px_-2px_rgba(0,0,0,0.1)]' : 'text-zinc-500 hover:text-zinc-700'}`}>全年</button>
                                                <button onClick={() => setTimeRange('custom')} className={`px-4 py-1 text-[13px] font-semibold rounded-full transition-all duration-200 h-full flex items-center gap-1.5 ${timeRange === 'custom' ? 'bg-white text-zinc-900 shadow-[0_2px_8px_-2px_rgba(0,0,0,0.1)]' : 'text-zinc-500 hover:text-zinc-700'}`}>自定义 <CalendarDays size={14} className={timeRange==='custom'?'text-zinc-800':'opacity-70'}/></button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-4">
                                        <div className="bg-white/40 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.03)] rounded-[24px] p-6 flex flex-col justify-between transition-transform hover:-translate-y-0.5 duration-300">
                                            <div className="text-[13px] text-zinc-500 font-medium mb-3 flex items-center justify-between">当前区间总调用 <TrendingUp size={16} className="text-zinc-400"/></div>
                                            <div className="text-[36px] font-bold tracking-tight text-zinc-900 leading-none">{currentTotalOcr + currentTotalSummary}</div>
                                        </div>
                                        <div className="bg-white/40 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.03)] rounded-[24px] p-6 flex flex-col justify-between transition-transform hover:-translate-y-0.5 duration-300">
                                            <div className="text-[13px] text-zinc-500 font-medium mb-3">智能 OCR 消耗</div>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-[32px] font-bold tracking-tight text-zinc-900 leading-none">{currentTotalOcr}</span>
                                                <span className="text-[12px] font-bold text-zinc-400 uppercase tracking-wide">OCR</span>
                                            </div>
                                        </div>
                                        <div className="bg-white/40 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.03)] rounded-[24px] p-6 flex flex-col justify-between transition-transform hover:-translate-y-0.5 duration-300">
                                            <div className="text-[13px] text-zinc-500 font-medium mb-3">智能小结 消耗</div>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-[32px] font-bold tracking-tight text-zinc-900 leading-none">{currentTotalSummary}</span>
                                                <span className="text-[12px] font-bold text-zinc-400 uppercase tracking-wide">小结</span>
                                            </div>
                                        </div>
                                        <div className="bg-white/40 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.03)] rounded-[24px] p-6 flex flex-col justify-between transition-transform hover:-translate-y-0.5 duration-300">
                                            <div className="text-[13px] text-zinc-500 font-medium mb-3">{timeRange==='month'?'日均峰值':'区间峰值'}</div>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-[32px] font-bold tracking-tight text-zinc-900 leading-none">{Math.max(...displayChartData.map(d => d.total)) || 0}</span>
                                                <span className="text-[12px] font-medium text-zinc-400">次/{timeRange==='year'?'月':'日'}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full bg-white/50 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_4px_24px_-8px_rgba(0,0,0,0.03)] rounded-[32px] p-8">
                                        <div className="flex items-center justify-between mb-8">
                                            <h3 className="text-[18px] font-semibold text-zinc-800">
                                                趋势分析 <span className="text-[13px] font-medium text-zinc-400 ml-2">动态重绘引擎</span>
                                            </h3>
                                            <div className="flex items-center gap-6">
                                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500 shadow-sm"></div><span className="text-[12px] font-medium text-zinc-600">OCR 计数</span></div>
                                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-500 shadow-sm"></div><span className="text-[12px] font-medium text-zinc-600">小结 计数</span></div>
                                            </div>
                                        </div>
                                        <SmoothLineChart data={displayChartData} />
                                    </div>

                                    <div className="w-full mt-4">
                                        <div className="px-2 mb-4 flex justify-between items-end">
                                            <div>
                                                <h3 className="text-[18px] font-semibold text-zinc-800">数据存档明细</h3>
                                                <p className="text-[13px] text-zinc-400 mt-0.5">默认按月归档折叠。将鼠标移至存档行，点击编辑图标即可无感添加备注。</p>
                                            </div>
                                            <button className="flex items-center gap-1.5 px-4 py-2 bg-white ring-1 ring-zinc-200/80 hover:bg-zinc-50 text-zinc-700 rounded-full text-[13px] font-semibold transition-all shadow-sm active:scale-95">
                                                <Download size={14} /> 导出报表
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-[160px_100px_100px_100px_minmax(200px,1fr)] gap-x-6 items-center px-8 py-3 text-[13px] font-medium text-zinc-400 mb-2 whitespace-nowrap">
                                            <div>时间归档 (Date)</div>
                                            <div>智能 OCR</div>
                                            <div>智能小结</div>
                                            <div>总计消耗</div>
                                            <div className="pl-4 border-l border-zinc-200/60">存档备注</div>
                                        </div>

                                        <div className="space-y-4">
                                            {filteredArchiveData.length === 0 && (
                                                <div className="py-12 text-center text-zinc-400 text-[14px]">当前区间无任何存档记录</div>
                                            )}
                                            {filteredArchiveData.map((monthData, idx) => {
                                                const isExpanded = expandedMonths.includes(monthData.month);
                                                return (
                                                    <div key={idx} className="bg-white/50 backdrop-blur-2xl ring-1 ring-white/80 shadow-[0_4px_24px_-8px_rgba(0,0,0,0.02)] rounded-[20px] overflow-hidden transition-all duration-300">
                                                        
                                                        {/* 一级菜单：月份汇总行 */}
                                                        <div onClick={() => toggleMonth(monthData.month)} className="grid grid-cols-[160px_100px_100px_100px_minmax(200px,1fr)] gap-x-6 items-center px-8 py-4 hover:bg-white/70 cursor-pointer transition-colors group">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`text-zinc-400 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}><ChevronDown size={18} /></div>
                                                                <span className="text-zinc-900 font-bold text-[15px]">{monthData.month.replace('-','年')}月</span>
                                                            </div>
                                                            <div className="text-[15px] font-semibold text-zinc-800">{monthData.totalOcr} <span className="text-[11px] text-zinc-400 ml-1">次</span></div>
                                                            <div className="text-[15px] font-semibold text-zinc-800">{monthData.totalSummary} <span className="text-[11px] text-zinc-400 ml-1">次</span></div>
                                                            <div className="text-[16px] font-bold text-zinc-900">{monthData.total}</div>
                                                            
                                                            {/* 核心优化 3：Apple 风极致无感编辑框 */}
                                                            <div className="pl-4 border-l border-zinc-200/60 h-full flex items-center group/remark" onClick={e => e.stopPropagation()}>
                                                                <div className="relative w-full flex items-center">
                                                                    <input
                                                                        type="text"
                                                                        value={monthData.remark}
                                                                        onChange={(e) => handleMonthRemarkChange(monthData.month, e.target.value)}
                                                                        className="w-full bg-transparent border-none text-[13px] text-zinc-600 hover:bg-black/5 focus:bg-white focus:shadow-sm focus:ring-1 focus:ring-zinc-200 focus:text-zinc-900 rounded-[6px] px-3 py-1.5 transition-all outline-none cursor-text relative z-10"
                                                                    />
                                                                    {/* 空状态下悬浮显示铅笔图标，彻底去除占位符文字 */}
                                                                    {!monthData.remark && (
                                                                        <div className="absolute left-3 flex items-center gap-1.5 text-zinc-400 pointer-events-none opacity-0 group-hover/remark:opacity-100 transition-opacity">
                                                                            <Edit size={13} />
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* 二级菜单：每日明细列表 (折叠区) */}
                                                        <div className={`overflow-hidden expand-transition ${isExpanded ? 'max-h-[8000px] opacity-100 border-t border-zinc-200/50' : 'max-h-0 opacity-0'}`}>
                                                            <div className="bg-zinc-50/50 py-2">
                                                                {monthData.days.map((dayData, dayIdx) => (
                                                                    <div key={dayIdx} className="grid grid-cols-[160px_100px_100px_100px_minmax(200px,1fr)] gap-x-6 items-center px-8 py-2.5 hover:bg-white/60 transition-colors group/day">
                                                                        <div className="flex items-center gap-3 pl-8">
                                                                            <div className="w-[1px] h-4 bg-zinc-300 mr-1"></div>
                                                                            <span className="text-zinc-600 font-mono font-medium text-[13px]">{dayData.date}</span>
                                                                        </div>
                                                                        <div className="text-[14px] font-medium text-zinc-700">{dayData.ocr}</div>
                                                                        <div className="text-[14px] font-medium text-zinc-700">{dayData.summary}</div>
                                                                        <div className="text-[14px] font-semibold text-zinc-800">{dayData.total}</div>
                                                                        
                                                                        {/* 每日备注同样逻辑 */}
                                                                        <div className="pl-4 border-l border-zinc-200/40 h-full flex items-center group/dayremark">
                                                                            <div className="relative w-full flex items-center">
                                                                                <input
                                                                                    type="text"
                                                                                    value={dayData.remark}
                                                                                    onChange={(e) => handleDayRemarkChange(monthData.month, dayData.date, e.target.value)}
                                                                                    className="w-full bg-transparent border-none text-[13px] text-zinc-500 hover:bg-black/5 focus:bg-white focus:shadow-sm focus:ring-1 focus:ring-zinc-200 focus:text-zinc-800 rounded-[6px] px-3 py-1 transition-all outline-none cursor-text relative z-10"
                                                                                />
                                                                                {!dayData.remark && (
                                                                                    <div className="absolute left-3 flex items-center gap-1.5 text-zinc-400 pointer-events-none opacity-0 group-hover/dayremark:opacity-100 transition-opacity">
                                                                                        <Edit size={13} />
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>

                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab !== 'analytics' && (
                                <div className="flex flex-col items-center justify-center gap-6 w-full opacity-60 text-center py-20 pointer-events-none">
                                    <div className="text-zinc-400 font-medium">（为聚焦演示分析页，非核心页面在此占位）</div>
                                    <button onClick={() => setActiveTab('analytics')} className="text-blue-500 hover:text-blue-600 underline pointer-events-auto transition-colors">点击回到数据分析页</button>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
